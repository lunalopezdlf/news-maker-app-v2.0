<div class="container">

    <section class="form-section">
        <h2>Publicar nueva noticia</h2>
        <!-- FORMULARIO -->
        <div>
            <label for="title">Título</label>
            <input type="text" id="title" placeholder="Título" [(ngModel)]="newItem.title">
        </div>
        <div>
            <label for="image">Imagen</label>
            <input type="text" id="image" placeholder="URL imagen" [(ngModel)]="newItem.image">
        </div>
        <div>
            <label for="date">Fecha de publicación</label>
            <input type="date" id="date" [(ngModel)]="newItem.date" >
        </div>
        <div>
            <label for="text">Noticia</label>
            <textarea id="text" placeholder="Escribe tu noticia aquí..." [(ngModel)]="newItem.text"></textarea>
        </div>
        <button (click)="addNews()">Publicar</button>
        
    </section>

    <section class="list-section">
        <!-- LISTA NOTICIAS -->
        <div class="news">
            @for(news of myNews(); track news){
            <article class="card">
                <h2>{{news.title}}</h2>
                <figure>
                    <img [src]="news.image" [alt]="news.title">
                </figure>
                <p [innerHTML]="news.text"></p>
                <div>
                    <p>Fecha: {{news.date | date:"dd/MM/yyyy"}}</p>
                </div>
            </article>
            }
        </div>
    </section>

</div>
