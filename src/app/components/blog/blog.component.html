<div class="container">

    <section class="form-section">
        <h2>Publicar nueva noticia</h2>
        <!-- FORMULARIO -->
        <div>
            <label for="titulo">Titulo</label>
            <input type="text" id="titulo" placeholder="Título" required >
        </div>
        <div>
            <label for="imagen">Imagen</label>
            <input type="text" id="imagen" placeholder="Título"  required >
        </div>
        <div>
            <label for="fecha">Fecha de publicacion</label>
            <input type="date" id="fecha" placeholder="Título" required >
        </div>
        <div>
            <label for="texto">Noticia</label>
            <textarea id="texto" placeholder="Escribe tu noticia..."  required ></textarea>
        </div>
        <button>Publicar</button>
        
    </section>

    <section class="list-section">
        <!-- LISTA NOTICIAS -->
        <div class="news">
            @for(news of newsList(); track news){
            <article class="card">
                <h2>{{news.title}}</h2>
                <figure>
                    <img [src]="news.image" [alt]="news.title">
                </figure>
                <p [innerHTML]="news.text"></p>
                <div>
                    <p>Fecha: {{news.date | date:"dd/MM/yyyy"}}</p>
                </div>
            </article>
            }
        </div>
    </section>

</div>
